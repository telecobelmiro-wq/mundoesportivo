{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Esportivo | Loja Oficial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            flex: 1 0 auto;
        }

        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .card-img-top {
            height: 250px;
            object-fit: cover;
        }
    </style>
</head>

<body class="bg-light">

    <div class="content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="/">MUNDO ESPORTIVO</a>

                <div class="d-flex">
                    <a href="{% url 'carrinho' %}" class="btn btn-outline-light position-relative">
                        Carrinho
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            1
                        </span>
                    </a>
                </div>
            </div>
        </nav>

        <div class="container mt-5">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <footer class="bg-white text-center py-4 border-top">
        <div class="container">
            <p class="text-muted mb-0">© 2026 Mundo Esportivo - Projeto Senac</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
