{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Esportivo | Loja Oficial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            flex: 1 0 auto;
        }

        .navbar-brand-centered {
            font-weight: 900 !important;
            letter-spacing: 5px;
            font-size: 2.2rem !important;
            text-transform: uppercase;
            margin: 0 auto !important;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .navbar .container {
            position: relative;
            min-height: 60px;
        }

        .card-img-top {
            height: 250px;
            object-fit: cover;
        }
    </style>
</head>

<body class="bg-light">

    <div class="content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
            <div class="container d-flex align-items-center">

                <a class="navbar-brand navbar-brand-centered" href="/">
                    MUNDO ESPORTIVO
                </a>

                <div class="ms-auto">
                    <a href="{% url 'carrinho' %}" class="btn btn-primary position-relative border-light">
                        Carrinho
                        {% if contagem_carrinho > 0 %}
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            {{ contagem_carrinho }}
                        </span>
                        {% endif %}
                    </a>
                </div>

            </div>
        </nav>

        <div class="container mt-5">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <footer class="bg-white text-center py-4 border-top">
        <div class="container">
            <p class="text-muted mb-0">© 2026 Mundo Esportivo - Projeto Senac de Teleco e Elton jhon</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
