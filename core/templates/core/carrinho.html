{% extends 'core/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <h2 class="mb-4">Meu Carrinho</h2>

        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-2">
                        <img src="https://via.placeholder.com/100" class="img-fluid rounded" alt="Produto">
                    </div>
                    <div class="col-md-4">
                        <h5>Chuteira de Teste</h5>
                        <p class="text-muted small">Categoria: Calçados</p>
                    </div>
                    <div class="col-md-2 text-center">
                        <input type="number" class="form-control" value="1">
                    </div>
                    <div class="col-md-2 text-end">
                        <span class="fw-bold">R$ 299,90</span>
                    </div>
                    <div class="col-md-2 text-end">
                        <button class="btn btn-sm btn-outline-danger">Remover</button>
                    </div>
                </div>
            </div>
        </div>

        <a href="/" class="btn btn-link text-decoration-none">← Continuar Comprando</a>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm bg-light">
            <div class="card-body">
                <h4 class="card-title mb-4">Resumo</h4>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span>R$ 299,90</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Frete</span>
                    <span class="text-success">Grátis</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4">
                    <strong>Total</strong>
                    <strong class="h4 text-primary">R$ 299,90</strong>
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-success btn-lg">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
