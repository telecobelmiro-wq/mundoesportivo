<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Livros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Cadastro e Listagem de Livros</h2>

        <div class="card p-4 mb-5 shadow-sm">
            <h4>Novo Livro</h4>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-primary">Cadastrar Livro</button>
            </form>
        </div>

        <h3>Livros Cadastrados</h3>
        <table class="table table-striped table-bordered bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Ano</th>
                </tr>
            </thead>
            <tbody>
                {% for livro in livros %}
                <tr>
                    <td>{{ livro.id }}</td>
                    <td>{{ livro.titulo }}</td>
                    <td>{{ livro.autor }}</td>
                    <td>{{ livro.ano }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center text-muted">Nenhum livro cadastrado ainda.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/gerenciamento/emprestimos/" class="btn btn-secondary mt-3">Ir para Empréstimos →</a>
    </div>
</body>

</html>
